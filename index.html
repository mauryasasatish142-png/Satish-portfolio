<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satish Maurya - MIS Executive | Professional Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --accent: #4facfe;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.7;
            color: #fff;
            overflow-x: hidden;
            background: #0a0a0a;
        }

        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 2rem;
        }

        .profile-hero {
            width: 150px; height: 150px;
            border-radius: 50%;
            background: var(--primary);
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        .hero-content h1 { font-size: 3rem; margin-bottom: 10px; }
        .subtitle { font-size: 1.5rem; color: #4facfe; margin-bottom: 30px; }

        .btn {
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            color: white;
            background: var(--primary);
            transition: 0.3s;
            display: inline-block;
        }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <section class="hero">
        <div class="hero-content">
            <div class="profile-hero">
                <i class="fas fa-user-tie"></i>
            </div>
            <h1>Satish Maurya</h1>
            <p class="subtitle">MIS Executive & Data Analyst</p>
            <p style="max-width: 600px; margin-bottom: 30px;">Expert in Advanced Excel, Data Reporting, and Automated Dashboards.</p>
            <div class="cta-buttons">
                <a href="https://wa.me/" class="btn">Hire Me</a>
            </div>
        </div>
    </section>
</body>
</html>
